<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — OurMoneyTrail</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,.2);
    }
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -0.5px;
    }
    .brand p {
      font-size: .75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: .25rem;
    }
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: .35rem;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: .7rem .85rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .2s;
      margin-bottom: 1.25rem;
    }
    input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    .btn {
      width: 100%;
      padding: .75rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #4f46e5; }
    .error-list {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: .75rem 1rem;
      margin-bottom: 1.25rem;
      color: #dc2626;
      font-size: .82rem;
      list-style: none;
    }
    .messages {
      list-style: none;
      margin-bottom: 1rem;
    }
    .messages li {
      padding: .6rem .85rem;
      border-radius: 8px;
      font-size: .82rem;
      margin-bottom: .5rem;
    }
    .messages .success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .messages .info { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <h1>OurMoneyTrail</h1>
      <p>Family Finance Management</p>
    </div>

    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    {% if form.errors %}
    <ul class="error-list">
      <li>Invalid username or password. Please try again.</li>
    </ul>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autofocus required>
      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password" required>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
</body>
</html>
