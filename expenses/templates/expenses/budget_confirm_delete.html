{% extends "expenses/base.html" %}
{% load expense_tags %}
{% block content %}
<div class="card" style="max-width:480px;margin:0 auto;">
  <h1 style="font-size:1.2rem;font-weight:700;margin-bottom:1rem;">Delete Budget</h1>
  <p>Delete the budget for <strong>{% if budget.category %}{{ budget.category.name }}{% else %}Overall{% endif %}</strong> ({{ budget.month_name }}, {{ budget.amount|inr }})?</p>
  <form method="post" style="display:flex;gap:.5rem;margin-top:1.25rem;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'budget_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
