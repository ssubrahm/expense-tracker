{% extends "expenses/base.html" %}
{% load expense_tags %}
{% block content %}
<div class="form-card" style="max-width:480px;text-align:center;">
  <div style="width:64px;height:64px;background:var(--red-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1.25rem;">🗑️</div>
  <h1 style="margin-bottom:.75rem;">Delete Expense</h1>
  <p style="color:var(--muted);margin-bottom:1.5rem;">
    Are you sure you want to delete <strong style="color:var(--text);">{{ expense.title }}</strong> ({{ expense.amount|inr }})?
    This action cannot be undone.
  </p>
  <form method="post" style="display:flex;gap:.5rem;justify-content:center;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
