{% extends "expenses/base.html" %}
{% block content %}
<div class="form-card" style="max-width:480px;text-align:center;">
  <div style="width:64px;height:64px;background:{{ member.avatar_color }};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;font-weight:800;margin:0 auto 1.25rem;">
    {{ member.initials }}
  </div>
  <h1 style="margin-bottom:.75rem;">Remove Family Member</h1>
  <p style="color:var(--muted);margin-bottom:1.5rem;">
    Are you sure you want to deactivate <strong style="color:var(--text);">{{ member.name }}</strong>?
    Their expense history will be preserved, but they won't appear in new expense forms.
  </p>
  <form method="post" style="display:flex;gap:.5rem;justify-content:center;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, deactivate</button>
    <a href="{% url 'family_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
